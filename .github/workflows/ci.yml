name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec nx run-many -t lint test typecheck

      - run: pnpm exec nx fix-ci
        if: always()

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build for GitHub Pages
        run: pnpm exec nx build web
        env:
          GITHUB_PAGES: true
          NEXT_PUBLIC_BASE_PATH: /rp-vibe-ideation
          # Vite sub-apps read this to prefix their asset base path
          BASE_PATH_PREFIX: /rp-vibe-ideation

      # Angular's baseHref is baked into angular.json and cannot be set via env.
      # Patch the exported index.html directly in the out/ artifact.
      - name: Patch Angular app base href for GitHub Pages
        run: |
          sed -i 's|<base href="/apps/angular-app/">|<base href="/rp-vibe-ideation/apps/angular-app/">|g' \
            apps/web/out/apps/angular-app/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
